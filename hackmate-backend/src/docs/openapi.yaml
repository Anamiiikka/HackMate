openapi: 3.0.3
info:
  title: HackMate API
  version: 1.0.0
  description: Hackathon teammate matching platform

servers:
  - url: http://localhost:5000/api/v1

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:               { type: string, format: uuid }
        name:             { type: string }
        email:            { type: string }
        bio:              { type: string }
        timezone:         { type: string }
        location:         { type: string }
        experience_level: { type: string, enum: [beginner, intermediate, advanced] }
        github_url:       { type: string }
        linkedin_url:     { type: string }
        avatar_url:       { type: string }

    Skill:
      type: object
      properties:
        id:       { type: integer }
        name:     { type: string }
        category: { type: string, enum: [frontend, backend, mobile, devops, ml_ai, database, design, other] }

    Hackathon:
      type: object
      properties:
        id:            { type: string, format: uuid }
        name:          { type: string }
        description:   { type: string }
        start_date:    { type: string, format: date }
        end_date:      { type: string, format: date }
        mode:          { type: string, enum: [online, offline, hybrid] }
        max_team_size: { type: integer }
        tech_focus:    { type: array, items: { type: string } }
        website_url:   { type: string }

    MatchRequest:
      type: object
      properties:
        id:           { type: string, format: uuid }
        from_user_id: { type: string, format: uuid }
        to_user_id:   { type: string, format: uuid }
        hackathon_id: { type: string, format: uuid }
        status:       { type: string, enum: [pending, accepted, rejected, expired, cancelled] }
        message:      { type: string }
        created_at:   { type: string, format: date-time }

    Message:
      type: object
      properties:
        id:              { type: string, format: uuid }
        conversation_id: { type: string, format: uuid }
        sender_id:       { type: string, format: uuid }
        content:         { type: string }
        created_at:      { type: string, format: date-time }
        read_at:         { type: string, format: date-time }

paths:

  # ── AUTH ──────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:     { type: string, example: "Arjun Sharma" }
                email:    { type: string, example: "arjun@example.com" }
                password: { type: string, minLength: 8 }
      responses:
        201:
          description: User registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:      { type: string }
                  access_token: { type: string }
                  refresh_token:{ type: string }
        400: { description: Validation error }
        409: { description: Email already exists }

  /auth/login:
    post:
      tags: [Auth]
      summary: Login and receive tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:    { type: string }
                password: { type: string }
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:  { type: string }
                  refresh_token: { type: string }
        401: { description: Invalid credentials }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Get new access token using refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token: { type: string }
      responses:
        200:
          description: New access token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token: { type: string }
        401: { description: Invalid or expired refresh token }

  # ── USERS ─────────────────────────────────
  /users/me:
    get:
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      summary: Get my profile
      responses:
        200:
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
    put:
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      summary: Update my profile
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                bio:              { type: string }
                timezone:         { type: string }
                location:         { type: string }
                experience_level: { type: string, enum: [beginner, intermediate, advanced] }
                github_url:       { type: string }
                linkedin_url:     { type: string }
      responses:
        200: { description: Profile updated }

  /users/me/skills:
    put:
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      summary: Set my skills (replaces existing)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                required: [skill_id, proficiency]
                properties:
                  skill_id:         { type: integer }
                  proficiency:      { type: integer, minimum: 1, maximum: 5 }
                  years_experience: { type: number }
      responses:
        200: { description: Skills saved }

  /users/me/availability:
    post:
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      summary: Add an availability slot for a hackathon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hackathon_id, start_time, end_time]
              properties:
                hackathon_id:  { type: string, format: uuid }
                day_of_week:   { type: integer, minimum: 0, maximum: 6, description: "0=Sun, 6=Sat. Use either this OR specific_date" }
                specific_date: { type: string, format: date }
                start_time:    { type: string, example: "09:00" }
                end_time:      { type: string, example: "22:00" }
      responses:
        201: { description: Slot added }

  /users/me/availability/{id}:
    delete:
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      summary: Delete an availability slot
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        200: { description: Slot deleted }

  /users/{id}:
    get:
      tags: [Profile]
      security: [{ bearerAuth: [] }]
      summary: Get another user's public profile
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        200:
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        404: { description: User not found }

  # ── HACKATHONS (read-only) ─────────────────
  /hackathons:
    get:
      tags: [Hackathons]
      summary: Get all active hackathons (for dropdown selection)
      responses:
        200:
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Hackathon' }

  # ── MATCHING ──────────────────────────────
  /hackathons/{id}/recommendations:
    get:
      tags: [Matching]
      security: [{ bearerAuth: [] }]
      summary: Get top teammate recommendations for a hackathon
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        200:
          description: Ranked list with match scores
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    user:                    { $ref: '#/components/schemas/User' }
                    score:                   { type: number, example: 87.5 }
                    matched_skills:          { type: array, items: { type: string } }
                    availability_overlap_pct:{ type: number, example: 75 }

  # ── REQUESTS ──────────────────────────────
  /requests:
    post:
      tags: [Requests]
      security: [{ bearerAuth: [] }]
      summary: Send a teammate request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to_user_id, hackathon_id]
              properties:
                to_user_id:   { type: string, format: uuid }
                hackathon_id: { type: string, format: uuid }
                message:      { type: string, example: "Hey! I saw your profile, let's team up!" }
      responses:
        201: { description: Request sent }
        409: { description: Request already exists }

  /requests/incoming:
    get:
      tags: [Requests]
      security: [{ bearerAuth: [] }]
      summary: Get all incoming pending requests
      responses:
        200:
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/MatchRequest' }

  /requests/{id}:
    patch:
      tags: [Requests]
      security: [{ bearerAuth: [] }]
      summary: Accept or reject a request
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [accepted, rejected] }
      responses:
        200: { description: Request status updated }
        403: { description: Not your request }
        404: { description: Request not found }

  # ── CHAT (HTTP) ───────────────────────────
  /conversations:
    get:
      tags: [Chat]
      security: [{ bearerAuth: [] }]
      summary: Get all my conversations
      responses:
        200:
          description: List of conversations with last message preview
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:           { type: string, format: uuid }
                    type:         { type: string, enum: [direct, team] }
                    participants: { type: array, items: { $ref: '#/components/schemas/User' } }
                    last_message: { $ref: '#/components/schemas/Message' }

  /conversations/{id}/messages:
    get:
      tags: [Chat]
      security: [{ bearerAuth: [] }]
      summary: Get paginated message history
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: before
          in: query
          description: Cursor for pagination (ISO timestamp)
          schema: { type: string, format: date-time }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        200:
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Message' }
        403: { description: Not a participant }
